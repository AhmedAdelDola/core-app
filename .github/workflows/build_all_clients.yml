name: Build and Deploy All Clients

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of update to deploy'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - release

jobs:
  discover_clients:
    name: Discover White-label Clients
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.set-clients.outputs.clients }}
      deploy_type: ${{ steps.set-type.outputs.type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Clients
        id: set-clients
        run: |
          CLIENTS_JSON=$(ls clients/ | jq -R -s -c 'split("\n")[:-1]')
          echo "Found clients: $CLIENTS_JSON"
          echo "clients=$CLIENTS_JSON" >> $GITHUB_OUTPUT

      - name: Determine Deploy Type
        id: set-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            # Default to patch on regular pushes
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

  build_android:
    name: Build & Deploy Android (${{ matrix.client }})
    needs: discover_clients
    runs-on: ubuntu-latest
    environment: ${{ matrix.client }}
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Switch Flavor
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo $KEYSTORE_B64 | base64 --decode > android/app/keystore.jks

      - name: Generate key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "storePassword=$STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=app/keystore.jks" >> android/key.properties

      - name: Shorebird OTA Patch (Android)
        if: needs.discover_clients.outputs.deploy_type == 'patch'
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird patch android --force

      - name: Shorebird Release (Android)
        if: needs.discover_clients.outputs.deploy_type == 'release'
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird release android --force

      - name: Extract Package Name
        if: needs.discover_clients.outputs.deploy_type == 'release'
        id: get_package_name
        run: |
          PACKAGE_NAME=$(jq -r '.packageName' clients/${{ matrix.client }}/client_config.json)
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Deploy to Google Play
        if: needs.discover_clients.outputs.deploy_type == 'release'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed

  build_ios:
    name: Build & Deploy iOS (${{ matrix.client }})
    needs: discover_clients
    runs-on: macos-latest
    environment: ${{ matrix.client }}
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Switch Flavor
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
      
      - name: Shorebird OTA Patch (iOS)
        if: needs.discover_clients.outputs.deploy_type == 'patch'
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          echo "$EXPORT_OPTIONS_PLIST" > ios/ExportOptions.plist
          shorebird patch ios --force --export-options-plist=ios/ExportOptions.plist
          
      - name: Shorebird Release (iOS)
        if: needs.discover_clients.outputs.deploy_type == 'release'
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          echo "$EXPORT_OPTIONS_PLIST" > ios/ExportOptions.plist
          shorebird release ios --force --export-options-plist=ios/ExportOptions.plist
          
      - name: Upload to App Store TestFlight
        if: needs.discover_clients.outputs.deploy_type == 'release'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
