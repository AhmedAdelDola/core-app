name: Build and Deploy All Clients

on:
  push:
    branches:
      - main

jobs:
  discover_clients:
    name: Discover White-label Clients
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.set-clients.outputs.clients }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Clients
        id: set-clients
        run: |
          CLIENTS_JSON=$(ls clients/ | jq -R -s -c 'split("\n")[:-1]')
          echo "Found clients: $CLIENTS_JSON"
          echo "clients=$CLIENTS_JSON" >> $GITHUB_OUTPUT

  build_android:
    name: Build & Deploy Android (${{ matrix.client }})
    needs: discover_clients
    runs-on: ubuntu-latest
    environment: ${{ matrix.client }}
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Switch Flavor
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          echo $KEYSTORE_B64 | base64 --decode > android/app/keystore.jks

      - name: Generate key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "storePassword=$STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Extract Package Name
        id: get_package_name
        run: |
          PACKAGE_NAME=$(jq -r '.packageName' clients/${{ matrix.client }}/client_config.json)
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Deploy to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  build_ios:
    name: Build & Deploy iOS (${{ matrix.client }})
    needs: discover_clients
    runs-on: macos-latest
    environment: ${{ matrix.client }}
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'

      - name: Switch Flavor
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Extract the UUID from the mobileprovision file
          UUID=$(security cms -D -i $PP_PATH | grep -a -A1 UUID | grep -o "[-a-zA-Z0-9]\{36\}")
          
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
      
      - name: Build iOS IPA
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          echo "$EXPORT_OPTIONS_PLIST" > ios/ExportOptions.plist
          
          # Fix the destination in ExportOptions.plist so it exports locally instead of trying to upload directly without credentials
          sed -i '' 's/<string>upload<\/string>/<string>export<\/string>/g' ios/ExportOptions.plist
          
          # 1. Force Xcode to use Manual signing instead of Automatic
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 2. Extract the Bundle ID for the current white-label client
          PACKAGE_NAME=$(jq -r '.packageName' clients/${{ matrix.client }}/client_config.json)
          
          # 3. Extract the Profile Name from your ExportOptions.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :provisioningProfiles:$PACKAGE_NAME" ios/ExportOptions.plist)
          
          # 4. Inject the profile name into the build config so the Archive step knows which one to use
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=Apple Distribution" >> ios/Flutter/Release.xcconfig
          
          # 5. Build the IPA (Archive + Export)
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload to App Store TestFlight
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # 1. Create the private_keys directory required by altool
          mkdir -p ~/private_keys
          
          # 2. Decode the base64-encoded private key (this preserves newlines perfectly)
          echo "$PRIVATE_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${API_KEY}.p8
          
          # 3. Find the IPA
          IPA_FILE=$(find . -name "*.ipa" | head -n 1)
          
          if [ -z "$IPA_FILE" ]; then
            echo "Error: Could not find .ipa file!"
            exit 1
          fi
          
          echo "Found IPA at: $IPA_FILE"
          
          # 4. Upload to TestFlight
          xcrun altool --upload-app --type ios --file "$IPA_FILE" --apiKey "$API_KEY" --apiIssuer "$API_ISSUER"

