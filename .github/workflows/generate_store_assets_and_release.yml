name: Multi-Tenant Automated Store Screenshots & Framing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  discover_clients:
    name: Discover White-Label Clients
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.set-clients.outputs.clients }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Clients
        id: set-clients
        run: |
          CLIENTS_JSON=$(ls clients/ | jq -R -s -c 'split("\n")[:-1]')
          echo "Found clients: $CLIENTS_JSON"
          echo "clients=$CLIENTS_JSON" >> $GITHUB_OUTPUT

  android_screenshots:
    name: Android Screenshots (${{ matrix.client }})
    needs: discover_clients
    runs-on: ubuntu-latest
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Hardware Acceleration for Emulator
        run: |
          sudo apt-get update
          sudo apt-get install -y cpu-checker
          kvm-ok || true

      - name: Switch White-Label Flavor & Branding
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Android Integration Tests & Capture Screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel
          disable-animations: true
          script: |
            mkdir -p raw_screenshots
            flutter test integration_test/take_screenshots_test.dart --dart-define=TAKING_SCREENSHOTS=true || true

      - name: Generate Framed Store Screenshots (Android)
        run: dart scripts/frame_screenshots.dart --client ${{ matrix.client }} --input-dir raw_screenshots

      - name: Archive Android Store Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots-android-${{ matrix.client }}
          path: output/store_assets/${{ matrix.client }}/android/

  ios_screenshots:
    name: iOS Screenshots (${{ matrix.client }})
    needs: discover_clients
    runs-on: macos-latest
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Switch White-Label Flavor & Branding
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Get Dependencies
        run: flutter pub get

      - name: Launch iOS Simulator & Capture Screenshots
        run: |
          mkdir -p raw_screenshots
          # Boot default iOS Simulator
          open -a Simulator
          sleep 10
          flutter test integration_test/take_screenshots_test.dart --dart-define=TAKING_SCREENSHOTS=true || true

      - name: Generate Framed Store Screenshots (iOS)
        run: dart scripts/frame_screenshots.dart --client ${{ matrix.client }} --input-dir raw_screenshots

      - name: Archive iOS Store Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots-ios-${{ matrix.client }}
          path: output/store_assets/${{ matrix.client }}/ios/
