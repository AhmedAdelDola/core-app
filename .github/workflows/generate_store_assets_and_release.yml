name: Multi-Tenant Real App Screenshots

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  discover_clients:
    name: Discover White-Label Clients
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.set-clients.outputs.clients }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Clients
        id: set-clients
        run: |
          CLIENTS_JSON=$(ls clients/ | jq -R -s -c 'split("\n")[:-1]')
          echo "Found clients: $CLIENTS_JSON"
          echo "clients=$CLIENTS_JSON" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # ANDROID: Real screenshots via FlutterDriver on emulator
  # ─────────────────────────────────────────────────────────────
  android_screenshots:
    name: Android Screenshots (${{ matrix.client }})
    needs: discover_clients
    runs-on: ubuntu-latest
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Switch White-Label Flavor & Branding
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Get Dependencies
        run: flutter pub get

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Prepare screenshot capture script
        env:
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
        run: |
          cat > capture_android_screenshots.sh << CAPTURE_SCRIPT
          #!/bin/bash
          set -euo pipefail
          set -x
          mkdir -p raw_screenshots
          flutter drive \
            --driver=test_driver/screenshot_driver.dart \
            --target=lib/main_screenshot.dart \
            --dart-define=TAKING_SCREENSHOTS=true \
            --dart-define=TEST_PHONE="$TEST_PHONE" \
            --dart-define=TEST_PASS="$TEST_PASS" \
            -d emulator-5554
          if ! compgen -G "raw_screenshots/*.png" > /dev/null; then
            echo "No raw screenshots were captured."
            exit 1
          fi
          CAPTURE_SCRIPT
          chmod +x capture_android_screenshots.sh

      - name: Run Android Emulator & Capture Real Screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel
          disable-animations: true
          script: bash capture_android_screenshots.sh

      - name: Frame Screenshots for Store (Android)
        run: dart scripts/frame_screenshots.dart --client ${{ matrix.client }} --input-dir raw_screenshots

      - name: Upload Android Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots-android-${{ matrix.client }}
          path: output/store_assets/${{ matrix.client }}/android/

  # ─────────────────────────────────────────────────────────────
  # iOS: Real screenshots via FlutterDriver on macOS Simulator
  # ─────────────────────────────────────────────────────────────
  ios_screenshots:
    name: iOS Screenshots (${{ matrix.client }})
    needs: discover_clients
    runs-on: macos-latest
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Switch White-Label Flavor & Branding
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Get Dependencies & Install Pods
        run: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | grep -oE "[-A-F0-9]{36}" | head -n1)
          echo "Booting iOS Simulator UDID: $UDID"
          xcrun simctl boot "$UDID" || true
          open -a Simulator
          xcrun simctl bootstatus "$UDID" -b
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Build iOS App for Simulator
        env:
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
        run: |
          flutter build ios --simulator --no-codesign \
            --target=lib/main_screenshot.dart \
            --dart-define=TAKING_SCREENSHOTS=true \
            --dart-define=TEST_PHONE="$TEST_PHONE" \
            --dart-define=TEST_PASS="$TEST_PASS"

      - name: Capture Real iOS Screenshots via FlutterDriver
        env:
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
        run: |
          set -euo pipefail
          mkdir -p raw_screenshots
          flutter drive \
            --driver=test_driver/screenshot_driver.dart \
            --target=lib/main_screenshot.dart \
            --no-build \
            --dart-define=TAKING_SCREENSHOTS=true \
            --dart-define=TEST_PHONE="$TEST_PHONE" \
            --dart-define=TEST_PASS="$TEST_PASS" \
            -d "$SIMULATOR_UDID"
          if ! compgen -G "raw_screenshots/*.png" > /dev/null; then
            echo "No raw screenshots were captured."
            exit 1
          fi

      - name: Frame Screenshots for Store (iOS)
        run: dart scripts/frame_screenshots.dart --client ${{ matrix.client }} --input-dir raw_screenshots

      - name: Upload iOS Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots-ios-${{ matrix.client }}
          path: output/store_assets/${{ matrix.client }}/ios/
