name: Multi-Tenant Real App Screenshots

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  discover_clients:
    name: Discover White-Label Clients
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.set-clients.outputs.clients }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover Clients
        id: set-clients
        run: |
          CLIENTS_JSON=$(ls clients/ | jq -R -s -c 'split("\n")[:-1]')
          echo "Found clients: $CLIENTS_JSON"
          echo "clients=$CLIENTS_JSON" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # ANDROID: Real screenshots via FlutterDriver on emulator
  # FlutterDriver.screenshot() uses the Dart VM service — works
  # even with swiftshader (software renderer), no GPU required.
  # ─────────────────────────────────────────────────────────────
  android_screenshots:
    name: Android Screenshots (${{ matrix.client }})
    needs: discover_clients
    runs-on: ubuntu-latest
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Switch White-Label Flavor & Branding
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Get Dependencies
        run: flutter pub get

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Emulator & Capture Real Screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel
          disable-animations: true
          script: |
            mkdir -p raw_screenshots
            DEVICE_ID=$(adb devices | grep -v "List" | grep "device$" | head -n1 | awk '{print $1}')
            echo "Using device: $DEVICE_ID"
            flutter drive \
              --driver=test_driver/screenshot_driver.dart \
              --target=lib/main_screenshot.dart \
              --dart-define=TAKING_SCREENSHOTS=true \
              -d "$DEVICE_ID" || true

      - name: Frame Screenshots for Store (Android)
        run: dart scripts/frame_screenshots.dart --client ${{ matrix.client }} --input-dir raw_screenshots

      - name: Upload Android Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots-android-${{ matrix.client }}
          path: output/store_assets/${{ matrix.client }}/android/

  # ─────────────────────────────────────────────────────────────
  # iOS: Real screenshots via FlutterDriver on macOS Simulator
  # xcrun simctl provides real GPU rendering on macOS runners.
  # ─────────────────────────────────────────────────────────────
  ios_screenshots:
    name: iOS Screenshots (${{ matrix.client }})
    needs: discover_clients
    runs-on: macos-latest
    strategy:
      matrix:
        client: ${{ fromJson(needs.discover_clients.outputs.clients) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Switch White-Label Flavor & Branding
        run: dart scripts/switch_flavor.dart ${{ matrix.client }}

      - name: Get Dependencies
        run: flutter pub get

      - name: Boot iOS Simulator
        run: |
          # Pick iPhone 15 or 14 (store-required sizes)
          UDID=$(xcrun simctl list devices available | grep -E "iPhone 1[5-7]" | head -n 1 | grep -oE "[-A-F0-9]{36}" | head -n1)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | grep -oE "[-A-F0-9]{36}" | head -n1)
          fi
          echo "Booting simulator: $UDID"
          xcrun simctl boot "$UDID" || true
          open -a Simulator --args -CurrentDeviceUDID "$UDID"
          sleep 15
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Capture Real iOS Screenshots via FlutterDriver
        run: |
          mkdir -p raw_screenshots
          flutter drive \
            --driver=test_driver/screenshot_driver.dart \
            --target=lib/main_screenshot.dart \
            --dart-define=TAKING_SCREENSHOTS=true \
            -d "$SIMULATOR_UDID" || true

      - name: Frame Screenshots for Store (iOS)
        run: dart scripts/frame_screenshots.dart --client ${{ matrix.client }} --input-dir raw_screenshots

      - name: Upload iOS Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: store-screenshots-ios-${{ matrix.client }}
          path: output/store_assets/${{ matrix.client }}/ios/
